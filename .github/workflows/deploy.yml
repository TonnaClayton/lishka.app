name: Deploy

# Prerendered production deploy pipeline.
#
# Vercel's build container is missing the shared libraries
# Puppeteer needs to run its bundled Chrome (libnspr4.so, etc.),
# so the landing prerender can't run there. GitHub Actions'
# ubuntu-latest runner does have those libs, so we build the
# prerendered dist/ here and push it to Vercel as a prebuilt
# deploy — no rebuild on Vercel's side.
#
# Setup required in the repo (one time):
#   1. Secrets → Actions → add:
#        VERCEL_TOKEN      - vercel.com/account/tokens
#        VERCEL_ORG_ID     - team_QTjsGEeVco2DkokJbMSCgLk6
#        VERCEL_PROJECT_ID - prj_JQhwM8sXYBattUhVAszW82fDZRGN
#   2. Vercel dashboard → Project Settings → Git → disconnect
#      the Git integration (or set "Ignored Build Step" to
#      always skip) so Vercel's own build doesn't race this one.

on:
  push:
    branches: [main]
  # Manual trigger from the Actions tab for re-deploys without a
  # code change (e.g. rotating env vars, forcing a rebuild).
  workflow_dispatch:

concurrency:
  # Cancel any in-flight production deploy if a newer push lands
  # before it finishes.
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Prerender + deploy to Vercel
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://lishka.app/

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      # Enable the Puppeteer-based landing prerender in
      # vite.config.ts. Vercel's own build leaves this unset so
      # its fallback build succeeds without a browser.
      ENABLE_PRERENDER: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        # Node 22 satisfies puppeteer@25's engines constraint
        # (>=22.12.0). On Node 20 the postinstall was silently
        # skipped and Chrome never downloaded, leaving the
        # prerender plugin with no browser to launch.
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Ensure Puppeteer's Chrome is installed
        # Explicit install as a belt-and-braces measure — even if
        # npm ci's postinstall handles it, running this again is a
        # no-op and gives us a clear log line to grep for.
        run: npx puppeteer browsers install chrome

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        # Needed for `vercel deploy --prebuilt` below to target
        # the right project. `vercel pull` also creates
        # .vercel/.env.production.local but that file has empty
        # strings for any env var marked "Sensitive" in Vercel —
        # which is why we can't use it to bootstrap the build.
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Write env vars for build from GitHub secrets
        # Vercel's "Sensitive" env vars come back as "" from
        # `vercel pull`, so we can't rely on that file to have
        # the Supabase URL/key. Copy the required secrets from
        # GitHub Actions secrets into .env.production.local so
        # Vite inlines the real values at build time — otherwise
        # createClient() throws inside Puppeteer, React never
        # mounts, and the snapshot captures the shell.
        run: |
          cat > .env.production.local <<EOF
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          EOF

      - name: Build (prerender lands the landing HTML into dist/)
        # Run npm run build directly rather than `vercel build`.
        # `vercel build` uses only env vars pulled from the Vercel
        # project (via `vercel pull`) and drops the workflow-level
        # ENABLE_PRERENDER we need to enable the prerender plugin.
        # Running `npm run build` directly here keeps that env var
        # visible to the Vite build.
        env:
          ENABLE_PRERENDER: "true"
        run: |
          echo "== env probe before build =="
          echo "ENABLE_PRERENDER=$ENABLE_PRERENDER"
          npm run build
          echo "== dist/index.html size after build =="
          wc -c dist/index.html

      - name: Package dist/ into .vercel/output/ for prebuilt deploy
        # Vercel's `--prebuilt` deploy reads .vercel/output/ (the
        # Build Output API v3 format). For a static site that's
        # just static files under `static/` + a minimal config
        # declaring version 3 and an SPA-fallback rewrite so any
        # unmatched route falls back to /index.html (matching what
        # vercel.json used to do).
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/. .vercel/output/static/
          cat > .vercel/output/config.json <<'JSON'
          {
            "version": 3,
            "routes": [
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          JSON

      - name: Deploy prebuilt to Vercel production
        # --prebuilt tells Vercel not to run its own build — just
        # ship what's already in .vercel/output as production.
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
