    <title>Lishka | Never miss the day it&apos;s firing</title>

    <!--
      Open Graph + Twitter card meta tags — control how the link
      preview looks when Lishka is shared in iMessage, Slack,
      WhatsApp, Discord, Facebook, LinkedIn, X, etc.

      This is a SPA so the same tags apply to every route. If a
      per-route preview is needed later, wire react-helmet-async
      into the app root. Until then, the landing preview is what
      any /login /home /fish/* etc. link also renders.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Lishka" />
    <meta property="og:url" content="https://www.lishka.app/" />
    <meta property="og:title" content="Lishka | Never miss the day it&apos;s firing" />
    <meta
      property="og:description"
      content="Hourly fishing scores tuned to your location, your method, and the live marine forecast."
    />
    <meta property="og:image" content="https://www.lishka.app/assets/v4-hero-bg.jpg" />
    <meta property="og:image:alt" content="Lishka — hourly fishing scores tuned to your location and method." />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lishka | Never miss the day it&apos;s firing" />
    <meta
      name="twitter:description"
      content="Hourly fishing scores tuned to your location, your method, and the live marine forecast."
    />
    <meta name="twitter:image" content="https://www.lishka.app/assets/v4-hero-bg.jpg" />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
      crossorigin="anonymous"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"

      rel="stylesheet"
    />

    <!-- Meta Pixel — gated to non-localhost hosts so dev work doesn't
         pollute production analytics. Pixel ID is public by design
         (it's transmitted in every event the browser sends, so
         keeping it out of source code wouldn't hide it). Custom
         events fire from `src/lib/meta-pixel.ts`; this snippet just
         loads the library and logs the auto-PageView. -->
    <script>
      (function () {
        if (
          location.hostname === "localhost" ||
          location.hostname === "127.0.0.1"
        ) {
          // Stub out fbq so calls from app code don't throw in dev.
          window.fbq = function () {};
          return;
        }
        !(function (f, b, e, v, n, t, s) {
          if (f.fbq) return;
          n = f.fbq = function () {
            n.callMethod
              ? n.callMethod.apply(n, arguments)
              : n.queue.push(arguments);
          };
          if (!f._fbq) f._fbq = n;
          n.push = n;
          n.loaded = !0;
          n.version = "2.0";
          n.queue = [];
          t = b.createElement(e);
          t.async = !0;
          t.src = v;
          s = b.getElementsByTagName(e)[0];
          s.parentNode.insertBefore(t, s);
        })(
          window,
          document,
          "script",
          "https://connect.facebook.net/en_US/fbevents.js",
        );
        fbq("init", "1301918371549325");
        fbq("track", "PageView");
      })();
    </script>
    <!-- End Meta Pixel -->
  </head>
  <body>
    <!-- Meta Pixel <noscript> fallback. HTML5 forbids <img> inside a
         <head>-level <noscript> (only <link>/<style>/<meta> are
         allowed there per the spec, and parse5 — used by Vite's PWA
         plugin — enforces this). Stock browsers tolerate the
         <head> form, but the build doesn't. So this lives in
         <body> as the spec requires while still giving us the
         no-JS fallback tracking ping. -->
    <noscript>
      <img
        height="1"
        width="1"
        style="display: none"
        src="https://www.facebook.com/tr?id=1301918371549325&ev=PageView&noscript=1"
        alt=""
      />
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- <script src="https://api.tempo.build/proxy-asset?url=https://storage.googleapis.com/tempo-public-assets/error-handling.js"></script> [deprecated] -->
  </body>
