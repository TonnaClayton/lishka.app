<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Lishka" />
    <meta
      name="description"
      content="Lishka scores every hour using wind, tide, weather, and moon conditions so good fishing windows are easy to spot. On iOS and Android."
    />
    <!-- <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://api.tempo.build https://storage.googleapis.com; connect-src 'self' https://api.openai.com https://customer-api.open-meteo.com https://marine-api.open-meteo.com https://www.gebco.net https://nominatim.openstreetmap.org https://tiles.openseamap.org https://unpkg.com https://storage.googleapis.com https://api.tempo.build https://*.supabase.co https://*.supabase.com https://blob.vercel-storage.com; img-src 'self' data: https: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com https://unpkg.com; frame-src 'self';"
    /> -->
    <title>Lishka | Never miss the day it&apos;s firing</title>

    <!--
      Canonical URL — apex lishka.app is our SEO-preferred host.
      Vercel 308-redirects www.lishka.app → lishka.app (see
      vercel.json).
    -->
    <link rel="canonical" href="https://lishka.app/" />

    <!--
      Apple smart banner — when the site is opened in Safari on
      iOS and the app isn't installed, Safari shows a "View" chip
      that deep-links to the App Store listing.
    -->
    <meta name="apple-itunes-app" content="app-id=6767207290" />

    <!--
      Google Play smart banner — Chrome on Android reads this to
      prompt "Open in Play Store" when the site loads and the
      native app isn't installed.
    -->
    <meta name="google-play-app" content="app-id=app.lishka.mobile" />

    <!--
      Open Graph + Twitter card meta tags — control how the link
      preview looks when Lishka is shared in iMessage, Slack,
      WhatsApp, Discord, Facebook, LinkedIn, X, etc.

      This is a SPA so the same tags apply to every route. If a
      per-route preview is needed later, wire react-helmet-async
      into the app root. Until then, the landing preview is what
      any /login /home /fish/* etc. link also renders.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Lishka" />
    <meta property="og:url" content="https://lishka.app/" />
    <meta
      property="og:title"
      content="Lishka | Never miss the day it's firing"
    />
    <meta
      property="og:description"
      content="Hourly fishing scores tuned to your location, your method, and the live marine forecast."
    />
    <meta
      property="og:image"
      content="https://lishka.app/assets/v4-hero-bg.jpg"
    />
    <meta
      property="og:image:alt"
      content="Lishka — hourly fishing scores tuned to your location and method."
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Lishka | Never miss the day it's firing"
    />
    <meta
      name="twitter:description"
      content="Hourly fishing scores tuned to your location, your method, and the live marine forecast."
    />
    <meta
      name="twitter:image"
      content="https://lishka.app/assets/v4-hero-bg.jpg"
    />

    <!--
      Structured data — JSON-LD SoftwareApplication schema. Tells
      Google we're an app so it can render the rich "App" result
      card when brand/product searches surface. aggregateRating
      deliberately omitted — Google penalises unverified rating
      claims, so until we can pull the App Store rating via API,
      we don't declare it here.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Lishka",
        "operatingSystem": "iOS, Android",
        "applicationCategory": "LifestyleApplication",
        "description": "Hourly fishing scores tuned to your location, your method, and the live marine forecast.",
        "url": "https://lishka.app/",
        "downloadUrl": "https://apps.apple.com/us/app/lishka/id6767207290",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "publisher": {
          "@type": "Organization",
          "name": "Lishka",
          "url": "https://lishka.app/"
        }
      }
    </script>

    <!-- Preload the hero background photo for LCP — this is the
         largest image above the fold, so painting it early is
         the biggest single Lighthouse win. -->
    <link
      rel="preload"
      as="image"
      href="/assets/v4-hero-bg.jpg"
      fetchpriority="high"
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
      crossorigin="anonymous"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Code+Pro:wght@700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Meta Pixel — gated to non-localhost hosts so dev work doesn't
         pollute production analytics. Pixel ID is public by design
         (it's transmitted in every event the browser sends, so
         keeping it out of source code wouldn't hide it). Custom
         events fire from `src/lib/meta-pixel.ts`; this snippet just
         loads the library and logs the auto-PageView. -->
    <script>
      (function () {
        if (
          location.hostname === "localhost" ||
          location.hostname === "127.0.0.1"
        ) {
          // Stub out fbq so calls from app code don't throw in dev.
          window.fbq = function () {};
          return;
        }
        !(function (f, b, e, v, n, t, s) {
          if (f.fbq) return;
          n = f.fbq = function () {
            n.callMethod
              ? n.callMethod.apply(n, arguments)
              : n.queue.push(arguments);
          };
          if (!f._fbq) f._fbq = n;
          n.push = n;
          n.loaded = !0;
          n.version = "2.0";
          n.queue = [];
          t = b.createElement(e);
          t.async = !0;
          t.src = v;
          s = b.getElementsByTagName(e)[0];
          s.parentNode.insertBefore(t, s);
        })(
          window,
          document,
          "script",
          "https://connect.facebook.net/en_US/fbevents.js",
        );
        // Multiple pixel init — Meta stacks these and dispatches
        // subsequent fbq('track', ...) calls to every registered
        // pixel. Running both while we compare data-flow between
        // accounts; drop one once we've picked the primary.
        fbq("init", "1301918371549325");
        fbq("init", "1369401328175009");
        fbq("track", "PageView");
      })();
    </script>
    <!-- End Meta Pixel -->
  </head>
  <body>
    <!-- Meta Pixel <noscript> fallback. HTML5 forbids <img> inside a
         <head>-level <noscript> (only <link>/<style>/<meta> are
         allowed there per the spec, and parse5 — used by Vite's PWA
         plugin — enforces this). Stock browsers tolerate the
         <head> form, but the build doesn't. So this lives in
         <body> as the spec requires while still giving us the
         no-JS fallback tracking ping. -->
    <noscript>
      <img
        height="1"
        width="1"
        style="display: none"
        src="https://www.facebook.com/tr?id=1301918371549325&ev=PageView&noscript=1"
        alt=""
      />
      <img
        height="1"
        width="1"
        style="display: none"
        src="https://www.facebook.com/tr?id=1369401328175009&ev=PageView&noscript=1"
        alt=""
      />
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- <script src="https://api.tempo.build/proxy-asset?url=https://storage.googleapis.com/tempo-public-assets/error-handling.js"></script> [deprecated] -->
  </body>
</html>
